<div class="deliveries-wrapper">
  <div class="deliveries-card">
    <h2>My Deliveries</h2>
    <p class="subtitle">View the status of your packages</p>

    <button class="request-btn" (click)="goToRequest()">Request a Delivery</button>

    <p class="error" *ngIf="error">{{ error }}</p>

    <div *ngIf="deliveries.length === 0 && !error" class="empty">
      <p>You have no deliveries yet.</p>
    </div>

    <div class="delivery-list">
      <div *ngFor="let d of deliveries" class="delivery-item">
        <h3>Package #{{ d.packageId }}</h3>

        <p><strong>Status:</strong> {{ d.status }}</p>
        <p><strong>Current Depot:</strong> {{ d.currentDepotId }}</p>
        <p><strong>Last Updated:</strong> {{ d.timestamp }}</p>

        <button class="track-btn" (click)="track(d.packageId)">Track</button>
      </div>
    </div>
  </div>
</div>
